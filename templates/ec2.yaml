AWSTemplateFormatVersion: '2010-09-09'

Parameters:

  VpcId:
    Type: String

  SubnetId:
    Type: String

Resources:

  EC2SecurityGroup:

    Type: AWS::EC2::SecurityGroup

    Properties:

      GroupDescription: EC2 Security Group

      VpcId: !Ref VpcId

      SecurityGroupIngress:

        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  MyEC2:

    Type: AWS::EC2::Instance

    Properties:

      InstanceType: t2.micro

      ImageId: ami-xxxxxxxx

      SecurityGroupIds:

        - !Ref EC2SecurityGroup

      SubnetId: !Ref SubnetId

      Tags:

        - Key: Name

          Value: Demo-EC2

Outputs:

  EC2Id:

    Value: !Ref MyEC2