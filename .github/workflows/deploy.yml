name: Deploy CloudFormation

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS Account
        run: |
          aws sts get-caller-identity
          echo "AWS_REGION=$AWS_REGION"
          echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION"

      - name: Validate VPC Template
        run: |
          aws cloudformation validate-template \
            --template-body file://templates/vpc.yaml

      - name: Validate EC2 Template
        run: |
          aws cloudformation validate-template \
            --template-body file://templates/ec2.yaml

      - name: Validate ALB Template
        run: |
          aws cloudformation validate-template \
            --template-body file://templates/alb.yaml

      - name: Validate RDS Template
        run: |
          aws cloudformation validate-template \
            --template-body file://templates/rds.yaml

      - name: Deploy VPC
        run: |
          aws cloudformation deploy \
            --stack-name demo-vpc \
            --template-file templates/vpc.yaml

      - name: Get VPC Outputs
        run: |
          echo "VPC_ID=$(aws cloudformation describe-stacks \
            --stack-name demo-vpc \
            --query "Stacks[0].Outputs[?OutputKey=='VpcId'].OutputValue" \
            --output text)" >> $GITHUB_ENV

          echo "PUBLIC_SUBNET1=$(aws cloudformation describe-stacks \
            --stack-name demo-vpc \
            --query "Stacks[0].Outputs[?OutputKey=='PublicSubnet1'].OutputValue" \
            --output text)" >> $GITHUB_ENV

          echo "PUBLIC_SUBNET2=$(aws cloudformation describe-stacks \
            --stack-name demo-vpc \
            --query "Stacks[0].Outputs[?OutputKey=='PublicSubnet2'].OutputValue" \
            --output text)" >> $GITHUB_ENV

          echo "PRIVATE_SUBNET1=$(aws cloudformation describe-stacks \
            --stack-name demo-vpc \
            --query "Stacks[0].Outputs[?OutputKey=='PrivateSubnet1'].OutputValue" \
            --output text)" >> $GITHUB_ENV

          echo "PRIVATE_SUBNET2=$(aws cloudformation describe-stacks \
            --stack-name demo-vpc \
            --query "Stacks[0].Outputs[?OutputKey=='PrivateSubnet2'].OutputValue" \
            --output text)" >> $GITHUB_ENV

      - name: Delete Failed EC2 Stack
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name demo-ec2 \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Deleting failed EC2 stack..."
            aws cloudformation delete-stack --stack-name demo-ec2
            aws cloudformation wait stack-delete-complete --stack-name demo-ec2
          fi

      - name: Deploy EC2
        id: deploy_ec2
        run: |
          aws cloudformation deploy \
            --stack-name demo-ec2 \
            --template-file templates/ec2.yaml \
            --parameter-overrides \
              VpcId=$VPC_ID \
              SubnetId=$PUBLIC_SUBNET1

      - name: Show EC2 Stack Events
        if: failure()
        run: |
          aws cloudformation describe-stack-events \
            --stack-name demo-ec2 || true

      - name: Get EC2 Output
        run: |
          echo "EC2_ID=$(aws cloudformation describe-stacks \
            --stack-name demo-ec2 \
            --query "Stacks[0].Outputs[?OutputKey=='EC2Id'].OutputValue" \
            --output text)" >> $GITHUB_ENV

      - name: Deploy ALB
        run: |
          aws cloudformation deploy \
            --stack-name demo-alb \
            --template-file templates/alb.yaml \
            --parameter-overrides \
              VpcId=$VPC_ID \
              PublicSubnet1=$PUBLIC_SUBNET1 \
              PublicSubnet2=$PUBLIC_SUBNET2 \
              EC2Id=$EC2_ID

      - name: Deploy RDS
        run: |
          aws cloudformation deploy \
            --stack-name demo-rds \
            --template-file templates/rds.yaml \
            --parameter-overrides \
              VpcId=$VPC_ID \
              PrivateSubnet1=$PRIVATE_SUBNET1 \
              PrivateSubnet2=$PRIVATE_SUBNET2

      - name: Show Stack Status
        run: |
          aws cloudformation describe-stacks --stack-name demo-vpc
          aws cloudformation describe-stacks --stack-name demo-ec2
          aws cloudformation describe-stacks --stack-name demo-alb
          aws cloudformation describe-stacks --stack-name demo-rds